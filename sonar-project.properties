# sonar-project.properties — place this in the ROOT of your repo
# This tells SonarCloud what to scan and how

sonar.projectKey=your_org_civicmind_v1
sonar.projectName=CivicMind V1 - Smelly Version
sonar.projectVersion=1.0

# Source files to scan
sonar.sources=backend
sonar.exclusions=backend/data/**,**/__pycache__/**,**/*.pyc

# Language
sonar.language=py

# Encoding
sonar.sourceEncoding=UTF-8
